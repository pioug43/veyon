name: "Windows CI image"

# Construit l'image toolchain de cross-compilation Windows (MXE + Qt6 + QCA) et
# la pousse sur GHCR. Build TRÈS long (~1-3 h) : lancé à la demande ou quand le
# Dockerfile change — jamais à chaque CI. Une fois l'image poussée et validée,
# le job windows-build (workflow_dispatch) l'utilise pour produire l'installeur.
on:
  workflow_dispatch:
  push:
    paths:
      - '.ci/windows/Dockerfile'
      - '.github/workflows/windows-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .ci/windows/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/veyon-ci-windows:latest
          # cache la couche MXE (~4 h) pour itérer vite sur les étapes suivantes (QCA…)
          cache-from: type=gha
          cache-to: type=gha,mode=max
